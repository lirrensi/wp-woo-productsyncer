# Woo Product Syncer — Test Environment
# Two WordPress + WooCommerce instances with the plugin active.
# Source: http://localhost:8080  |  Receiver: http://localhost:8081

services:

  # ── Databases ──────────────────────────────────────────────

  db_source:
    image: mariadb:10.11
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
    volumes:
      - db_data_source:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 30s
      interval: 3s
      timeout: 2s
      retries: 20

  db_receiver:
    image: mariadb:10.11
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
    volumes:
      - db_data_receiver:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 30s
      interval: 3s
      timeout: 2s
      retries: 20

  # ── WordPress Instances ────────────────────────────────────

  source:
    build: ./wordpress
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db_source:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_HOME', 'http://localhost:8080');
        define('WP_SITEURL', 'http://localhost:8080');
        define('WP_DEBUG', true);
        define('WP_DEBUG_LOG', true);
        define('WP_DEBUG_DISPLAY', false);
        define('WP_AUTO_UPDATE_CORE', false);
    volumes:
      - wp_source:/var/www/html
      - ..:/var/www/html/wp-content/plugins/woo-product-syncer
    depends_on:
      db_source:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/wp-admin/install.php"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s

  receiver:
    build: ./wordpress
    ports:
      - "8081:80"
    environment:
      WORDPRESS_DB_HOST: db_receiver:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_HOME', 'http://localhost:8081');
        define('WP_SITEURL', 'http://localhost:8081');
        define('WP_DEBUG', true);
        define('WP_DEBUG_LOG', true);
        define('WP_DEBUG_DISPLAY', false);
        define('WP_AUTO_UPDATE_CORE', false);
    volumes:
      - wp_receiver:/var/www/html
      - ..:/var/www/html/wp-content/plugins/woo-product-syncer
    depends_on:
      db_receiver:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/wp-admin/install.php"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s

volumes:
  db_data_source:
  db_data_receiver:
  wp_source:
  wp_receiver:
